{{- define "common.deployment" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.fullname" . }}
  namespace: {{ .Values.global.namespace | default "harvester" }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.serviceAccountName }}
      serviceAccountName: {{ . }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            {{- if .Values.env.extras }}
            {{- range $key, $value := .Values.env.extras }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.env.secretRefs }}
            {{- range .Values.env.secretRefs }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .valueFrom.secretKeyRef.name }}
                  key: {{ .valueFrom.secretKeyRef.key }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- else }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- else }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- end }}
        {{- if hasKey .Values "cloudsql" }}
        {{- if .Values.cloudsql.enabled }}
        # Cloud SQL Auth Proxy sidecar container
        - name: cloud-sql-proxy
          image: "{{ .Values.cloudsql.image.repository }}:{{ .Values.cloudsql.image.tag }}"
          imagePullPolicy: {{ .Values.cloudsql.image.pullPolicy | default "IfNotPresent" }}
          args:
            # If connecting from a VPC-native GKE cluster, you can use the
            # following flag to have the proxy connect over private IP
            - "--private-ip"
            # - "--auto-iam-authn"
            - "--port=5432"
            - "harvester-ai-428202:us-central1:harvester-dev"
          # command:
          #   - "/cloud-sql-proxy"
          #   - "--unix-socket=/cloudsql"
          #   {{- if .Values.cloudsql.usePrivateIp }}
          #   - "--private-ip"
          #   {{- end }}
          #   - "{{ .Values.cloudsql.instanceConnectionName }}"
          {{- if .Values.cloudsql.credentials }}
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/cloudsql/{{ .Values.cloudsql.credentials.key }}"
          volumeMounts:
            - name: cloudsql-instance-credentials
              mountPath: /secrets/cloudsql
              readOnly: true
            - name: cloudsql
              mountPath: /cloudsql
          {{- else }}
          volumeMounts:
            - name: cloudsql
              mountPath: /cloudsql
          {{- end }}
          securityContext:
            runAsUser: 2  # non-root user
            allowPrivilegeEscalation: false
          resources:
            {{- toYaml .Values.cloudsql.resources | nindent 12 }}
        {{- end }}
        {{- end }}
      {{- if hasKey .Values "cloudsql" }}
      {{- if .Values.cloudsql.enabled }}
      volumes:
        - name: cloudsql
          emptyDir: {}
        {{- if .Values.cloudsql.credentials }}
        - name: cloudsql-instance-credentials
          secret:
            secretName: {{ .Values.cloudsql.credentials.secretName }}
        {{- end }}
      {{- end }}
      {{- end }}
{{- end -}} 