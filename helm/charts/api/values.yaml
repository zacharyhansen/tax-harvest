# Default values for the API service
replicaCount: 1

image:
  repository: gcr.io/your-project/harvester-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  path: /core
  pathType: Prefix

# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
resources: {}

# Health check probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# Service account for GCP workload identity
serviceAccountName: google-secret-service-account

# Cloud SQL Auth Proxy configuration
cloudsql:
  enabled: true
  image:
    repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
    pullPolicy: IfNotPresent
  # Your Cloud SQL instance connection name
  instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
  # If using explicit credentials (key file) rather than workload identity
  # credentials:
  #   secretName: cloudsql-instance-credentials
  #   key: credentials.json
  resources: {}

env:
  NODE_ENV: production
  extras:
  # Database configuration
  # DB_HOST: '/cloudsql/harvester-ai-428202:us-central1:harvester-dev'
  # DB_NAME: harvester
  # DB_USER: postgres
  # Add more environment variables as needed
  # You can reference secrets like: ${SECRET_NAME}
  # DB_PASSWORD: "${DB_PASSWORD}"
  # API_KEY: "${API_KEY}"
  # PORT: '3000'
  # LOG_LEVEL: info

migrations:
  enabled: true
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
    tag: latest
    containerCommand: [/bin/sh, -c]
    containerArgs: ['chmod +x ./scripts/migrate.sh && ./scripts/migrate.sh']
  # Add migration-specific environment variables
  env:
    extras:
    # Migration specific environment variables
    # MIGRATION_STRATEGY: "up"
    # DB_SCHEMA: "public"
  # Add migration-specific secrets
  secretRefs:
  # Example: Reference secrets for migrations
  # - name: DB_MIGRATION_PASSWORD
  #   valueFrom:
  #     secretKeyRef:
  #       name: database-migration-creds
  #       key: password
  # - name: API_TOKEN
  #   valueFrom:
  #     secretKeyRef:
  #       name: api-tokens
  #       key: migration-token
