# Default values for the API service
replicaCount: 1

image:
  repository: gcr.io/your-project/harvester-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  path: /core
  pathType: Prefix
resources: {}

# Health check probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

# Service account for GCP workload identity
serviceAccountName: google-secret-service-account

# Cloud SQL Auth Proxy configuration
cloudsql:
  enabled: true
  instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
  resources: {}

env:
  NODE_ENV: production

migrations:
  enabled: false # Set to false to skip running migrations
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
    tag: latest
    containerCommand: [/bin/sh, -c]
    containerArgs: ['chmod +x ./scripts/migrate.sh && ./scripts/migrate.sh']

  cloudsql:
    enabled: true
    instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
    resources: {}
