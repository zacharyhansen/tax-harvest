apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-store
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.global.projectID }}
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: {{ .Values.config.serviceAccountName }}
            namespace: {{ .Values.global.namespace }}
          clusterLocation: {{ .Values.global.clusterLocation }}
          clusterName: {{ .Values.global.clusterName }}
