{{- range .Values.externalSecrets }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}-external-secret
  namespace: {{ $.Values.global.namespace }}
  annotations:
    helm.sh/hook: 'pre-install,pre-upgrade'
    helm.sh/hook-weight: '-90'
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: gcp-secret-store-{{ $.Values.global.environment | default "default" }}
    kind: ClusterSecretStore
  target:
    name: {{ .target }}
    creationPolicy: Owner
  data:
    {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey | default .secretKey }}
    {{- end }}
{{- end }} 