{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: {{ .Values.namespace | default "argocd" }}
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-server
    spec:
      containers:
        - name: argocd-server
          image: quay.io/argoproj/argocd:v2.11.3
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          args:
            - /usr/local/bin/argocd-server
          env:
            - name: ARGOCD_SERVER_INSECURE
              value: "false"
            - name: ARGOCD_SERVER_BASEHREF
              value: {{ .Values.server.basehref | default "/" | quote }}
            - name: ARGOCD_SERVER_ROOTPATH
              value: {{ .Values.server.rootpath | default "/" | quote }}
          livenessProbe:
            httpGet:
              path: /healthz?full=true
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 30
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
{{- end }} 