{{- if and .Values.argocd (and .Values.argocd.ingress .Values.argocd.ingress.enabled) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: {{ .Values.argocd.namespace | default "argocd" }}
  annotations:
    {{- if .Values.argocd.ingress.annotations }}
    {{- toYaml .Values.argocd.ingress.annotations | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.argocd.ingress.className | default "gce" }}
  rules:
  - host: {{ required "argocd.ingress.host is required" .Values.argocd.ingress.host }}
    http:
      paths:
      - path: {{ .Values.argocd.ingress.path | default "/" }}
        pathType: {{ .Values.argocd.ingress.pathType | default "Prefix" }}
        backend:
          service:
            name: {{ .Values.argocd.ingress.service.name | default "argocd-server" }}
            port:
              name: {{ .Values.argocd.ingress.service.port.name | default "http" }}
{{- end }} 