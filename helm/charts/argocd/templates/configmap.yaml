{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: {{ .Values.namespace | default "argocd" }}
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
data:
  server.insecure: "false"
  server.basehref: {{ .Values.server.basehref | default "/" | quote }}
  server.rootpath: {{ .Values.server.rootpath | default "/" | quote }}
  server.staticassets: {{ .Values.server.staticassets | default "/shared/app" | quote }}
  server.enable.gzip: "true"
  server.x.frame.options: "SAMEORIGIN"
  server.content.security.policy: "frame-ancestors 'self';"
  server.tls.minversion: "1.2"
  server.tls.maxversion: "1.3"
  server.tls.ciphers: "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256:TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256:TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384:TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384:TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305:TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
{{- end }} 