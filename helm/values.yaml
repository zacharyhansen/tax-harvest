# Global configuration
global:
  namespace: harvester
  environment: production
  domain: dev.taxharvest.ai
  projectID: harvester-ai-428202
  clusterLocation: us-central1-b
  clusterName: harvester-dev
  ingress:
    enabled: true
    className: gce
    annotations:
      kubernetes.io/ingress.global-static-ip-name: harvester-static-ip
      # Add any other GCP-specific annotations
      kubernetes.io/ingress.allow-http: 'true'
      networking.gke.io/managed-certificates: harvester-cert

# API service configuration
api:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources: {}
  # Health check probes
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  ingress:
    path: /core
    pathType: Prefix
  # Service account for GCP workload identity
  serviceAccountName: google-secret-service-account
  # Cloud SQL Auth Proxy configuration
  cloudsql:
    enabled: true
    image:
      repository: gcr.io/cloud-sql-connectors/cloud-sql-proxy
      pullPolicy: IfNotPresent
    # Your Cloud SQL instance connection name
    instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
    resources: {}
  env:
    NODE_ENV: production
    extras:
      DB_HOST: '/cloudsql/harvester-ai-428202:us-central1:harvester-dev'
      PORT: '3000'
      LOG_LEVEL: info
      ORIGIN: 'https://{{ .Values.global.domain }}'
      PLAID_ENV: 'https://production.plaid.com'
      CLIENT_ORIGIN: 'http://dev.taxharvest.ai'
      CLIENT_HOME_PAGE_PATH: /main/home
      CRON: true
      ETRADE_OAUTH_AUTHORIZE_URL: 'https://us.etrade.com/e/t/etws/authorize'
      ETRADE_HOSTNAME: api.etrade.com
      GOOGLE_PROJECT: harvester-ai-428202
      SECRET_SOURCE: GSM
      GCS_LOTS_BUCKET_NAME: lot_upload

    # Add a new section for secret references
    secretRefs:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database # Created by ExternalSecret
            key: DATABASE_URL
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY
  migrations:
    enabled: false # Set to false to skip running migrations
    image:
      repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
      tag: latest
      containerCommand: [/bin/sh, -c]
      containerArgs: ['chmod +x ./scripts/migrate.sh && ./scripts/migrate.sh']
    # Migration-specific environment variables
    env:
      extras:
        # Add migration-specific environment variables here
        MIGRATION_MODE: apply
        LOG_LEVEL: debug
    # Migration-specific secrets
    secretRefs:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database # Created by ExternalSecret
            key: DATABASE_URL
    # Ensure Cloud SQL configuration is explicitly added for migrations
    cloudsql:
      enabled: true # This ensures the Cloud SQL sidecar is included
      # Use the same instance connection name as the API
      instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'

# Web app configuration
web:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-web/harvester-web
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources: {}
  # Health check probes for the web frontend
  livenessProbe:
    httpGet:
      path: /api/health # Next.js specific health endpoint
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /api/health # Next.js specific health endpoint
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 2
    successThreshold: 1
  ingress:
    path: /
    pathType: Prefix
  env:
    NODE_ENV: production
    extras:
      # Frontend configuration
      # Add more environment variables as needed
      # NEXT_PUBLIC_APP_URL: "https://harvester.example.com"
      PORT: '3000'
      NEXT_PUBLIC_ENV: production
      CLERK_SECRET_KEY:
        valueFrom:
          secretKeyRef:
          name: clerk
          key: CLERK_SECRET_KEY
      STRIPE_SECRET_KEY:
        valueFrom:
          secretKeyRef:
            name: stripe
            key: STRIPE_SECRET_KEY
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_aGVscGVkLWVtdS00NC5jbGVyay5hY2NvdW50cy5kZXYk
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /auth/signin
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /auth/signup
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /main/home
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /main/home
      NEXT_PUBLIC_STRIPE_PUBLIC_KEY: pk_live_5qIntVhFeqoTw1Pehq7YOJvx004hj6d7sk
      NEXT_PUBLIC_CORE_SERVER_URL: 'https://{{ .Values.global.domain }}'

# Secrets configuration with External Secrets Operator
secrets:
  enabled: true
  # The rest of the configuration comes from the secrets chart's values.yaml
