global:
  namespace: harvester
  environment: production
  domain: dev.taxharvest.ai
  projectID: harvester-ai-428202
  clusterLocation: us-central1-b
  clusterName: harvester-dev
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.global-static-ip-name: harvester-static-ip
      kubernetes.io/ingress.allow-http: 'true'
      kubernetes.io/ingress.class: gce
      networking.gke.io/managed-certificates: harvester-cert
  # Added flag to indicate we're using the global consolidated ingress
  useGlobalIngress: true
api:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
    tag: v1.2.1
    pullPolicy: Always
  hookWeight: -10
  annotations:
    helm.sh/hook-weight: '-10'
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
    intervalSeconds: 15
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  ingress:
    path: /core
    pathType: Prefix
  serviceAccountName: google-secret-service-account
  cloudsql:
    enabled: true
    instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
    resources: {}
  env:
    NODE_ENV: production
    extras:
      PORT: 8000
      ORIGIN: https://dev.taxharvest.ai
      PLAID_ENV: https://production.plaid.com
      CLIENT_ORIGIN: http://dev.taxharvest.ai
      CLIENT_HOME_PAGE_PATH: /main/home
      CRON: true
      ETRADE_OAUTH_AUTHORIZE_URL: https://us.etrade.com/e/t/etws/authorize
      ETRADE_HOSTNAME: api.etrade.com
      GOOGLE_PROJECT: harvester-ai-428202
      SECRET_SOURCE: GCP
      GCS_LOTS_BUCKET_NAME: lot_upload
    secretRefs:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_URL
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY
  migrations:
    enabled: true
    activeDeadlineSeconds: 300 # Force job termination after 5 minutes
    image:
      repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
      tag: v1.0.3
      containerCommand: [/bin/sh, -c]
    containerArgs:
      - |
        set -e
        echo "Running database migration..."
        if ! npx prisma migrate deploy; then
          echo "Migration failed"
          exit 1
        fi
        echo "Migration completed successfully"

        echo "Gracefully terminating Cloud SQL Auth Proxy sidecar..."
        if pgrep -f cloud-sql-proxy > /dev/null; then
          pkill -TERM -f cloud-sql-proxy
          sleep 5
          if pgrep -f cloud-sql-proxy > /dev/null; then
            echo "Forcing termination of proxy..."
            if ! pkill -9 -f cloud-sql-proxy 2>/dev/null; then
              echo "Warning: Failed to force kill the proxy. It may have already exited."
            fi
          fi
        fi

        echo "Migration job complete"
        exit 0
    cloudsql:
      restartPolicy: Never
      enabled: true
      instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
      resources: {}
web:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-web/harvester-web
    tag: v1.2.1
    pullPolicy: Always
  hookWeight: 10
  annotations:
    helm.sh/hook-weight: '10'
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources: {}
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 2
    successThreshold: 1
  ingress:
    path: /
    pathType: Prefix
  serviceAccountName: google-secret-service-account
  env:
    NODE_ENV: production
    extras:
      PORT: '3000'
    secretRefs:
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: stripe
            key: STRIPE_SECRET_KEY
# Secrets configuration with External Secrets Operator
# secrets:
#   enabled: true
# The rest of the configuration comes from the secrets chart's values.yaml
