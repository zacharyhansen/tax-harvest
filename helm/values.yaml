global:
  projectID: harvester-ai-428202
  clusterLocation: us-central1-b
  clusterName: harvester-dev
  namespace: harvester
  ingress:
    enabled: true
    className: gce
  useGlobalIngress: true
  certificates:
    - name: harvester-dev-cert
      namespace: harvester-dev
      domains:
        - dev.taxharvest.ai
    - name: argocd-dev-cert
      namespace: argocd
      domains:
        - argocd-dev.taxharvest.ai
# Service accounts configuration
serviceAccounts:
  - name: google-secret-service-account
    gcpServiceAccount: harvester-secret-manager
api:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
    tag: v3.0.4
    pullPolicy: Always
  hookWeight: -10
  annotations:
    helm.sh/hook-weight: '-10'
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  serviceAccountName: harvester-api
  cloudsql:
    enabled: true
    instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
    resources: {}
  env:
    NODE_ENV: production
    extras:
      PORT: 8000
      NUETRAL_HARVEST_THRESHOLD: 1000
      CLIENT_HOME_PAGE_PATH: /main/home
    secretRefs:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_URL
      - name: DATABASE_NAME
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_NAME
      - name: DATABASE_HOST
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_HOST
      - name: DATABASE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_PASSWORD
      - name: DATABASE_PORT
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_PORT
      - name: DATABASE_USER
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_USER
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY
      - name: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
      - name: ETRADE_API_KEY
        valueFrom:
          secretKeyRef:
            name: etrade
            key: ETRADE_API_KEY
      - name: ETRADE_API_SECRET
        valueFrom:
          secretKeyRef:
            name: etrade
            key: ETRADE_API_SECRET
      - name: POLYGON_API_KEY
        valueFrom:
          secretKeyRef:
            name: polygon
            key: POLYGON_API_KEY
      - name: PLAID_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: plaid
            key: PLAID_SECRET_KEY
      - name: PLAID_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: plaid
            key: PLAID_CLIENT_ID
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: stripe
            key: STRIPE_SECRET_KEY
      - name: SENDGRID_API_KEY
        valueFrom:
          secretKeyRef:
            name: sendgrid
            key: SENDGRID_API_KEY
  migrations:
    enabled: true
    activeDeadlineSeconds: 300 # Force job termination after 5 minutes
    command: [/bin/sh, -c]
    args:
      - |
        echo "Starting Prisma migration..."
        # Wait briefly for the proxy to be ready
        sleep 5
        # Run the migration
        npx prisma migrate deploy

        # After migration completes, terminate the proxy sidecar
        if [ $? -eq 0 ]; then
          echo "Migration completed successfully, terminating sidecar..."
          # Use wget if available
          if command -v wget > /dev/null; then
            wget -q -O - http://localhost:9091/quitquitquit || echo "Using wget to terminate proxy"
          # Use node fetch if wget not available
          else
            node -e "fetch('http://localhost:9091/quitquitquit').then(() => console.log('Proxy termination request sent')).catch(e => console.error('Failed to terminate proxy:', e))" || echo "Using Node.js to terminate proxy"
          fi
          echo "Termination signal sent to proxy, waiting for shutdown..."
          sleep 3
          echo "Job completed"
        else
          echo "Migration failed with status $?"
          exit $?
        fi
    cloudsql:
      restartPolicy: Never
      enabled: true
      instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
      resources: {}
web:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-web/harvester-web
    tag: v3.0.4
    pullPolicy: Always
  hookWeight: 10
  annotations:
    helm.sh/hook-weight: '10'
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources: {}
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 2
    successThreshold: 1
  serviceAccountName: google-secret-service-account
  env:
    NODE_ENV: production
    extras:
      PORT: 3000
    secretRefs:
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: stripe
            key: STRIPE_SECRET_KEY
# Secrets configuration
secrets:
  enabled: true
  serviceAccountName: google-secret-service-account
  externalSecrets:
    - name: database
      target: database
      data:
        - secretKey: DATABASE_URL
          remoteKey: DATABASE_URL
        - secretKey: DATABASE_NAME
          remoteKey: DATABASE_NAME
        - secretKey: DATABASE_HOST
          remoteKey: DATABASE_HOST
        - secretKey: DATABASE_PORT
          remoteKey: DATABASE_PORT
        - secretKey: DATABASE_USER
          remoteKey: DATABASE_USER
        - secretKey: DATABASE_PASSWORD
          remoteKey: DATABASE_PASSWORD
    - name: clerk
      target: clerk
      data:
        - secretKey: CLERK_SECRET_KEY
          remoteKey: CLERK_SECRET_KEY
        - secretKey: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
          remoteKey: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
    - name: stripe
      target: stripe
      data:
        - secretKey: STRIPE_SECRET_KEY
          remoteKey: STRIPE_SECRET_KEY
    - name: etrade
      target: etrade
      data:
        - secretKey: ETRADE_API_KEY
          remoteKey: ETRADE_API_KEY
        - secretKey: ETRADE_API_SECRET
          remoteKey: ETRADE_API_SECRET
    - name: polygon
      target: polygon
      data:
        - secretKey: POLYGON_API_KEY
          remoteKey: POLYGON_API_KEY
    - name: plaid
      target: plaid
      data:
        - secretKey: PLAID_SECRET_KEY
          remoteKey: PLAID_SECRET_KEY
        - secretKey: PLAID_CLIENT_ID
          remoteKey: PLAID_CLIENT_ID
    - name: sendgrid
      target: sendgrid
      data:
        - secretKey: SENDGRID_API_KEY
          remoteKey: SENDGRID_API_KEY
argocd:
  enabled: true
  server:
    basehref: /
    rootpath: /
    staticassets: /shared/app
    tls:
      enabled: true
      secretName: argocd-server-tls
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.global-static-ip-name: argocd-dev-static-ip
      kubernetes.io/ingress.allow-http: 'false'
      kubernetes.io/ingress.class: gce
      networking.gke.io/managed-certificates: argocd-dev-cert
    host: argocd-dev.taxharvest.ai
    path: /
    pathType: Prefix
    service:
      name: argocd-server
      port:
        name: https
