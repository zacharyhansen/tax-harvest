global:
  projectID: harvester-ai-428202
  clusterLocation: us-central1-b
  clusterName: harvester-dev
  namespace: harvester
  ingress:
    enabled: true
    className: gce
  useGlobalIngress: true
  certificates:
    - name: harvester-dev-cert
      domains:
        - dev.taxharvest.ai
    - name: argocd-dev-cert
      domains:
        - argocd.dev.taxharvest.ai

# Service accounts configuration
serviceAccounts:
  - name: google-secret-service-account
    gcpServiceAccount: harvester-secret-manager

api:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
    tag: v1.2.1
    pullPolicy: Always
  hookWeight: -10
  annotations:
    helm.sh/hook-weight: '-10'
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  serviceAccountName: google-secret-service-account
  cloudsql:
    enabled: true
    instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
    resources: {}
  env:
    NODE_ENV: production
    extras:
      PORT: 8000
      PLAID_ENV: https://production.plaid.com
      ETRADE_OAUTH_AUTHORIZE_URL: https://us.etrade.com/e/t/etws/authorize
      ETRADE_HOSTNAME: api.etrade.com
      GOOGLE_PROJECT: harvester-ai-428202
      SECRET_SOURCE: GCP
      GCS_LOTS_BUCKET_NAME: lot_upload
    secretRefs:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_URL
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY

web:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-web/harvester-web
    tag: v1.2.1
    pullPolicy: Always
  hookWeight: 10
  annotations:
    helm.sh/hook-weight: '10'
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources: {}
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 2
    successThreshold: 1
  serviceAccountName: google-secret-service-account
  env:
    NODE_ENV: production
    extras:
      PORT: '3000'
    secretRefs:
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: stripe
            key: STRIPE_SECRET_KEY

# Secrets configuration with External Secrets Operator
secrets:
  enabled: true
  serviceAccountName: google-secret-service-account
  gcpServiceAccount: harvester-secret-manager
  externalSecrets:
    - name: database
      target: database
      data:
        - secretKey: DATABASE_URL
          remoteKey: DATABASE_URL
    - name: clerk
      target: clerk
      data:
        - secretKey: CLERK_SECRET_KEY
          remoteKey: CLERK_SECRET_KEY
    - name: stripe
      target: stripe
      data:
        - secretKey: STRIPE_SECRET_KEY
          remoteRef:
            key: stripe-secret-key

argocd:
  enabled: true
  server:
    tls:
      enabled: true
      secretName: argocd-server-tls
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.global-static-ip-name: argocd-dev-static-ip
      kubernetes.io/ingress.allow-http: 'false'
      kubernetes.io/ingress.class: gce
      networking.gke.io/managed-certificates: argocd-dev-cert
    host: argocd.dev.taxharvest.ai
    path: /
    pathType: Prefix
    service:
      name: argocd-server
      port:
        name: https
