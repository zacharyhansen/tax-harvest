global:
  projectID: harvester-ai-428202
  clusterLocation: us-central1-b
  clusterName: harvester-dev
  namespace: harvester-dev
  ingress:
    enabled: true
    className: gce
  useGlobalIngress: true
  certificates:
    - name: harvester-dev-cert
      namespace: harvester-dev
      domains:
        - dev.taxharvest.ai
    - name: argocd-dev-cert
      namespace: argocd
      domains:
        - argocd-dev.taxharvest.ai
# Service accounts configuration
serviceAccounts:
  - name: google-secret-service-account
    gcpServiceAccount: harvester-secret-manager
api:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api
    tag: v3.0.7
    pullPolicy: Always
  hookWeight: -10
  annotations:
    helm.sh/hook-weight: '-10'
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  resources: {}
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
    periodSeconds: 15
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  serviceAccountName: google-secret-service-account
  cloudsql:
    enabled: true
    instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
    resources: {}
  env:
    NODE_ENV: production
    extras:
      PORT: 8000
      NUETRAL_HARVEST_THRESHOLD: 1000
      CLIENT_HOME_PAGE_PATH: /main/home
      DEFAULT_EMAIL_ADDRESS: support@taxharvest.ai
    secretRefs:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_URL
      - name: DATABASE_URL_MIGRATION
        valueFrom:
          secretKeyRef:
            name: database
            key: DATABASE_URL_MIGRATION
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY
      - name: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
      - name: ETRADE_API_KEY
        valueFrom:
          secretKeyRef:
            name: etrade
            key: ETRADE_API_KEY
      - name: ETRADE_API_SECRET
        valueFrom:
          secretKeyRef:
            name: etrade
            key: ETRADE_API_SECRET
      - name: POLYGON_API_KEY
        valueFrom:
          secretKeyRef:
            name: polygon
            key: POLYGON_API_KEY
      - name: PLAID_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: plaid
            key: PLAID_SECRET_KEY
      - name: PLAID_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: plaid
            key: PLAID_CLIENT_ID
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: stripe
            key: STRIPE_SECRET_KEY
      - name: SENDGRID_API_KEY
        valueFrom:
          secretKeyRef:
            name: sendgrid
            key: SENDGRID_API_KEY
  migrations:
    enabled: true
    activeDeadlineSeconds: 300 # Force job termination after 5 minutes
    command: [/bin/sh, -c]
    args:
      - |
        /app/scripts/migrate.sh
    cloudsql:
      restartPolicy: Never
      enabled: true
      instanceConnectionName: 'harvester-ai-428202:us-central1:harvester-dev'
      resources: {}
    env:
      # use different connection for migrations to avoid RLS
      secretRefs:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database
              key: DATABASE_URL_MIGRATION
web:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/harvester-ai-428202/harvester-web/harvester-web
    tag: v3.0.7
    pullPolicy: Always
  hookWeight: 10
  annotations:
    helm.sh/hook-weight: '10'
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  resources: {}
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 2
    successThreshold: 1
  serviceAccountName: google-secret-service-account
  env:
    NODE_ENV: production
    extras:
      PORT: 3000
    secretRefs:
      - name: CLERK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: clerk
            key: CLERK_SECRET_KEY
      - name: STRIPE_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: stripe
            key: STRIPE_SECRET_KEY
# Secrets configuration
secrets:
  enabled: true
  serviceAccountName: google-secret-service-account
  externalSecrets:
    - name: database
      target: database
      data:
        - secretKey: DATABASE_URL
          remoteKey: DATABASE_URL
        - secretKey: DATABASE_URL_MIGRATION
          remoteKey: DATABASE_URL_MIGRATION
    - name: clerk
      target: clerk
      data:
        - secretKey: CLERK_SECRET_KEY
          remoteKey: CLERK_SECRET_KEY
        - secretKey: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
          remoteKey: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
    - name: stripe
      target: stripe
      data:
        - secretKey: STRIPE_SECRET_KEY
          remoteKey: STRIPE_SECRET_KEY
    - name: etrade
      target: etrade
      data:
        - secretKey: ETRADE_API_KEY
          remoteKey: ETRADE_API_KEY
        - secretKey: ETRADE_API_SECRET
          remoteKey: ETRADE_API_SECRET
    - name: polygon
      target: polygon
      data:
        - secretKey: POLYGON_API_KEY
          remoteKey: POLYGON_API_KEY
    - name: plaid
      target: plaid
      data:
        - secretKey: PLAID_SECRET_KEY
          remoteKey: PLAID_SECRET_KEY
        - secretKey: PLAID_CLIENT_ID
          remoteKey: PLAID_CLIENT_ID
    - name: sendgrid
      target: sendgrid
      data:
        - secretKey: SENDGRID_API_KEY
          remoteKey: SENDGRID_API_KEY
argocd:
  enabled: true
  server:
    tls:
      enabled: true
      secretName: argocd-server-tls
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.global-static-ip-name: argocd-dev-static-ip
      kubernetes.io/ingress.allow-http: 'false'
      kubernetes.io/ingress.class: gce
      networking.gke.io/managed-certificates: argocd-dev-cert
    host: argocd-dev.taxharvest.ai
    path: /
    pathType: Prefix
    service:
      name: argocd-server
      port:
        name: https
