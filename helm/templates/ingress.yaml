apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harvester-ingress
  namespace: {{ .Values.global.namespace | default "harvester" }}
  labels:
    app.kubernetes.io/name: {{ .Values.global.namespace | default "harvester" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    {{- with .Values.global.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingress.className }}
  rules:
    - host: {{ .Values.global.domain }}
      http:
        paths:
          # API service path
          - path: /core
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-api
                port:
                  number: 80
          # Web frontend path
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-web
                port:
                  number: 80 