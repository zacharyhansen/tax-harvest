{{- range .Values.serviceAccounts }}
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: {{ .name }}-workload-identity
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-190"
spec:
  member: serviceAccount:{{ $.Values.global.projectID }}.svc.id.goog[{{ $.Values.global.namespace }}/{{ .name }}]
  role: roles/iam.workloadIdentityUser
  resourceRef:
    apiVersion: iam.cnrm.cloud.google.com/v1beta1
    kind: IAMServiceAccount
    external: {{ .gcpServiceAccount }}@{{ $.Values.global.projectID }}.iam.gserviceaccount.com
{{- end }} 