{{- range .Values.serviceAccounts }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .name }}-workload-identity-setup
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-190"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      serviceAccountName: {{ .name }}
      containers:
      - name: gcloud
        image: google/cloud-sdk:slim
        command:
        - /bin/sh
        - -c
        - |
          gcloud iam service-accounts add-iam-policy-binding \
            {{ .gcpServiceAccount }}@{{ $.Values.global.projectID }}.iam.gserviceaccount.com \
            --project={{ $.Values.global.projectID }} \
            --role=roles/iam.workloadIdentityUser \
            --member=serviceAccount:{{ $.Values.global.projectID }}.svc.id.goog[{{ $.Values.global.namespace }}/{{ .name }}]
      restartPolicy: OnFailure
{{- end }} 