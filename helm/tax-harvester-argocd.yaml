apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tax-harvester
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/zacharyhansen/tax-harvest
    targetRevision: HEAD
    path: helm
  destination:
    server: https://kubernetes.default.svc
    namespace: harvester
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
