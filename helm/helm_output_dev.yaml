apiVersion: batch/v1
kind: Job
metadata:
  name: release-name-api-migrations
  namespace: harvester-dev
  labels:
    helm.sh/chart: api-0.1.0
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: 1.0.0
