# Source: harvester/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harvester-ingress
  namespace: harvester-dev
  labels:
    app.kubernetes.io/name: harvester-dev
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
  annotations:
    kubernetes.io/ingress.allow-http: "false"
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.global-static-ip-name: harvester-static-ip
    networking.gke.io/managed-certificates: harvester-dev-cert
spec:
  ingressClassName: gce
  rules:
    - host: dev.taxharvest.ai
      http:
        paths:
          - path: /core
            pathType: Prefix
            backend:
              service:
                name: release-name-api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: release-name-web
                port:
                  number: 80
