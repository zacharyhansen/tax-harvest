            - name: ETRADE_OAUTH_TOKEN_URL
              value: "https://us.etrade.com/e/t/etws/token"
            - name: GCS_LOTS_BUCKET_NAME
              value: lot_upload
            - name: GOOGLE_PROJECT
              value: harvester-ai-428202
            - name: MATCH_PERCENTAGE_DIFFERENCE
              value: 33
            - name: NUETRAL_HARVEST_THRESHOLD
              value: "1000"
            - name: NUETRAL_HARVEST_TARGET
              value: -3000
            - name: ORIGIN
              value: "https://dev.taxharvest.ai/core"
            - name: PLAID_ENV
              value: "https://production.plaid.com"
            - name: PORT
              value: "8000"
            - name: STRIPE_PUBLISHABLE_KEY
              value: pk_test_51RMA1bCIs96aprc48ICF4qlFkUUWlsfSnZw4xPQ4D43J775q4DkS1PPLFNdEu7cLyWFh6S0gRgk7W9FlFqwjZs1C00aQKxFWQW
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database
                  key: DATABASE_URL
            - name: DATABASE_URL_MIGRATION
              valueFrom:
                secretKeyRef:
                  name: database
                  key: DATABASE_URL_MIGRATION
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk
                  key: CLERK_SECRET_KEY
            - name: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
              valueFrom:
                secretKeyRef:
                  name: clerk
                  key: CLERK_USER_UPDATE_CREATE_WEBHOOK_SIGN_SECRET
            - name: ETRADE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: etrade
                  key: ETRADE_API_KEY
            - name: ETRADE_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: etrade
                  key: ETRADE_API_SECRET
            - name: POLYGON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: polygon
                  key: POLYGON_API_KEY
            - name: PLAID_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plaid
                  key: PLAID_SECRET_KEY
            - name: PLAID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: plaid
                  key: PLAID_CLIENT_ID
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe
                  key: STRIPE_SECRET_KEY
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sendgrid
                  key: SENDGRID_API_KEY
          resources: {}
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 3
        # Cloud SQL Auth Proxy sidecar container
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
          imagePullPolicy: IfNotPresent
          args:
            - --private-ip
            # - "--unix-socket=/cloudsql"
            - --port=5432
            - "harvester-ai-428202:us-central1:harvester-dev"
          volumeMounts:
            - name: cloudsql
              mountPath: /cloudsql
          securityContext:
            runAsUser: 2 # non-root user
            allowPrivilegeEscalation: false
          resources: {}
      volumes:
        - name: cloudsql
          emptyDir: {}
