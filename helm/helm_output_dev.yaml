    helm.sh/hook: "pre-install,pre-upgrade"
    helm.sh/hook-weight: "-50"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 30
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: migrations
    spec:
      serviceAccountName: google-secret-service-account
      shareProcessNamespace: true
      restartPolicy: Never
      containers:
        - name: migrations
          image: "us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api:v3.1.1"
          imagePullPolicy: Always
          command: [/bin/sh, -c]
          args:
            [
              "chmod +x /app/scripts/migrate.sh \u0026\u0026 /app/scripts/migrate.sh\n",
            ]
          env:
            # Add Cloud SQL instance connection name as an environment variable
            - name: INSTANCE_CONNECTION_NAME
              value: "harvester-ai-428202:us-central1:harvester-dev"
            # Add general environment variables except secrets
            - name: CLIENT_HOME_PAGE_PATH
              value: /main/home
            - name: CLIENT_ORIGIN
              value: "https://dev.taxharvest.ai"
            - name: DEFAULT_EMAIL_ADDRESS
              value: support@taxharvest.ai
            - name: ETRADE_HOSTNAME
              value: api.etrade.com
            - name: ETRADE_OAUTH_AUTHORIZE_URL
              value: "https://us.etrade.com/e/t/etws/authorize"
            - name: ETRADE_OAUTH_TOKEN_URL
              value: "https://us.etrade.com/e/t/etws/token"
            - name: GCS_LOTS_BUCKET_NAME
              value: lot_upload
            - name: GOOGLE_PROJECT
              value: harvester-ai-428202
            - name: MATCH_PERCENTAGE_DIFFERENCE
              value: "0.3"
            - name: NUETRAL_HARVEST_THRESHOLD
              value: "1000"
            - name: ORIGIN
              value: "https://dev.taxharvest.ai/core"
            - name: PLAID_ENV
              value: "https://production.plaid.com"
            - name: PORT
              value: "8000"
            - name: STRIPE_PUBLISHABLE_KEY
              value: pk_test_51RMA1bCIs96aprc48ICF4qlFkUUWlsfSnZw4xPQ4D43J775q4DkS1PPLFNdEu7cLyWFh6S0gRgk7W9FlFqwjZs1C00aQKxFWQW
            # Add migration-specific environment variables
            # Add migration-specific secrets (these will override any general secrets)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database
                  key: DATABASE_URL_MIGRATION
          #
          #
          # volumeMounts:
          #   - name: cloudsql
          #     mountPath: /cloudsql
          #
          #
        # Cloud SQL Auth Proxy sidecar container
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
          imagePullPolicy: IfNotPresent
          args:
            - --private-ip
            # - "--unix-socket=/cloudsql"
            - --port=5432
            # Enable the admin api server on port 9091
            - --admin-port=9091
            # Enable the /quitquitquit admin api endpoint
            - --quitquitquit
            # Tell the proxy to exit gracefully if it receives a SIGTERM
            - --exit-zero-on-sigterm
            - "harvester-ai-428202:us-central1:harvester-dev"
          # volumeMounts:
          #   - name: cloudsql
          #     mountPath: /cloudsql
          securityContext:
            runAsUser: 2 # non-root user
            allowPrivilegeEscalation: false
          lifecycle:
            preStop:
              exec:
                command: [/bin/sh, -c, sleep 1]
          resources: {}
      volumes:
        - name: cloudsql
          emptyDir: {}
