# Source: harvester/charts/api/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-api
  namespace: harvester
  labels:
    helm.sh/chart: api-0.1.0
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: harvester
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/instance: release-name
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/instance: release-name
    spec:
      serviceAccountName: google-secret-service-account
      containers:
        - name: api
          image: "us-central1-docker.pkg.dev/harvester-ai-428202/harvester-api/harvester-api:v1.0.3"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: CLIENT_HOME_PAGE_PATH
              value: "/main/home"
            - name: CLIENT_ORIGIN
              value: "http://dev.taxharvest.ai"
            - name: CRON
              value: "true"
            - name: DB_HOST
              value: "/cloudsql/harvester-ai-428202:us-central1:harvester-dev"
            - name: ETRADE_HOSTNAME
              value: "api.etrade.com"
            - name: ETRADE_OAUTH_AUTHORIZE_URL
              value: "https://us.etrade.com/e/t/etws/authorize"
            - name: GCS_LOTS_BUCKET_NAME
              value: "lot_upload"
            - name: GOOGLE_PROJECT
              value: "harvester-ai-428202"
            - name: LOG_LEVEL
              value: "info"
            - name: ORIGIN
              value: "https://{{ .Values.global.domain }}"
            - name: PLAID_ENV
              value: "https://production.plaid.com"
            - name: PORT
              value: "3000"
            - name: SECRET_SOURCE
              value: "GCP"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database
                  key: DATABASE_URL
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clerk
                  key: CLERK_SECRET_KEY
          resources:
            {}
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 3
        # Cloud SQL Auth Proxy sidecar container
        - name: cloud-sql-proxy
          image: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest"
          imagePullPolicy: IfNotPresent
          command:
            - "/cloud-sql-proxy"
            - "--unix-socket=/cloudsql"
            - "harvester-ai-428202:us-central1:harvester-dev"
          volumeMounts:
            - name: cloudsql
              mountPath: /cloudsql
          securityContext:
            runAsUser: 2  # non-root user
            allowPrivilegeEscalation: false
          resources:
            {}
      volumes:
        - name: cloudsql
          emptyDir: {}
---
