---
# Source: harvester/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harvester-ingress
  namespace: harvester
  labels:
    app.kubernetes.io/name: harvester
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
  annotations:
    kubernetes.io/ingress.allow-http: "true"
    kubernetes.io/ingress.class: gce
    kubernetes.io/ingress.global-static-ip-name: harvester-static-ip
spec:
  ingressClassName: 
  rules:
    - host: dev.taxharvest.ai
      http:
        paths:
          # API service path
          - path: /core
            pathType: Prefix
            backend:
              service:
                name: release-name-api
                port:
                  number: 80
          # Web frontend path
          - path: /
            pathType: Prefix
            backend:
              service:
                name: release-name-web
                port:
                  number: 80
---
# Source: harvester/charts/secrets/templates/secretstore.yaml
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-store
spec:
  provider:
    gcpsm:
      projectID: harvester-ai-428202
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: google-secret-service-account
            namespace: harvester
          clusterLocation: us-central1-b
          clusterName: harvester-dev
---
# Source: harvester/charts/secrets/templates/external-secrets.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-external-secret
  namespace: harvester
spec:
  refreshInterval: "15m"
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: database
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: DATABASE_URL
---
# Source: harvester/templates/managed-certificate.yaml
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: harvester-cert
  namespace: harvester
  labels:
    app.kubernetes.io/name: harvester
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
spec:
  domains:
    - dev.taxharvest.ai
