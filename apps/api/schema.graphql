type Mutation {
  accessOauthConnection(authSource: AuthSource!, portfolioId: String!, verifier: String!): AuthConnectionExt!

  """
  Add User to Portfolio. True if user added, False if user is invited as they do not exist
  """
  addUserToPortfolio(email: String!): Boolean!

  """Create a new connected account"""
  createAccountForPortfolio(accountCreateInput: AccountCreateInput!): Account!
  createFiles(data: [FileCreateManyInput!]!): [File!]!

  """Create harvest based on selected DirectedHarvestLot"""
  createHarvest(directedHarvestLots: [DirectedHarvestLot!]!, harvestType: HarvestType!): Harvest!

  """Create a portfolio for a user"""
  createPortfolio(portfolioInsertObject: PortfolioCreateInput!): Portfolio!

  """Delete a connected account and all associated data"""
  deleteAccount(accountWhereUniqueInput: AccountWhereUniqueInput!): Account!

  """Delete an auth connection and all associated accounts and data"""
  deleteAuthConnection(authConnectionId: String!): AuthConnection!

  """Delete multiple harvests by their IDs"""
  deleteHarvests(ids: [String!]!): Boolean!

  """Finalize harvest for review"""
  finalizeHarvest(id: String): Harvest!
  initAccountFileUpload(accountData: InitAccountFileUploadPayload!, fileData: [InitFileUploadPayload!]!): InitAccountFileUploadResponse!

  """Invite User to Platform"""
  inviteUsersToPlatform(emails: [String!]!): Boolean!

  """Remove User from Portfolio"""
  removeUserFromPortfolio(userId: String!): Boolean!
  sendNotificationsByFrequency(frequency: HarvestNotificationFrequency!): Boolean!
  sendWashSaleNotificationsForDate(date: DateTime!): Boolean!

  """Set up plaid auth connection and create accounts from syncing plaid"""
  setAccessTokenAndSyncAccounts(existingAccountId: String, metaData: PlaidLinkOnSuccessMetadata!, publicToken: String!): [Account!]!

  """Log the user into a different portfolio"""
  switchPortfolio(porfolioId: String!): Portfolio!
  syncAuthConnection(id: String!): AuthConnectionExt!

  """Update a connected account"""
  updateAccount(accountUpdateInput: AccountUpdateInput!, accountWhereUniqueInput: AccountWhereUniqueInput!): Account!

  """Update last price of every asset"""
  updateAllAssetPrices: String!

  """Update a Harvest"""
  updateHarvest(data: HarvestUpdateInput, id: String): Harvest!

  """Update a Harvest transaction"""
  updateHarvestTransaction(data: HarvestTransactionUpdateInput, id: String): HarvestTransaction!

  """Update a HarvestTransactionItem"""
  updateHarvestTransactionItem(data: HarvestTransactionItemUpdateInput, id: String): HarvestTransactionItem!

  """Pull hourly price data for all assets within the window."""
  updateHourlyAssetPrices(from: DateTime!, to: DateTime!): String!

  """Update a portfolio"""
  updatePortfolio(data: PortfolioUpdateInput!): Portfolio!

  """Update RealizedPAndL"""
  updateRealizedPAndL(id: String!, input: RealizedPAndLUpdateInput!): RealizedPAndL!

  """Update User"""
  updateUser(data: UserUpdateInput!): User!

  """Update a user"""
  updateUserById(updateUserInput: UserUpdateInput!): User!

  """Update User Favorites"""
  updateUserFavorites(data: UserUpdateInput!): User!
}

