type Query {
  """Find a connected account by id"""
  account(id: String!): Account!

  """Get accounts"""
  accounts(where: AccountWhereInput): [Account!]!
  adminMergeErrors: [MergeError!]!
  authConnection(id: String!): AuthConnectionExt!

  """Chart data for the past 3 months for a asset"""
  chartThreeMonth(asset: String!): [PolygonStockData!]!

  """Harvest within the directed params."""
  directedHarvest(lots: [DirectedHarvestLot!]!, targetRealized: Float!, targetUnrealized: Float!): HarvestResult!
  files(where: FileWhereInput): [File!]!

  """Find one user by email"""
  findOneUserByEmail(email: String!): User!

  """Get file upload url"""
  generateSignedUrlsForUpload(files: [GCPUploadFile!]!): SignedUrlsForUploadPayload!

  """Get file download url"""
  genrerateSignedUrlsForDownload(gcpFileNames: [String!]!): SignedUrlsForDownloadPayload!

  """Get a user"""
  getUserPublic(id: String!): User!

  """Get a Harvest"""
  harvest(id: String): Harvest!

  """Evaluate harvesting for portfolio,"""
  harvestEval: HarvestResult!

  """Evaluate harvesting for portfolio,"""
  harvestEvalResult(filters: HarvestEvalFilters): HarvestEvalResult!

  """Get Harvests"""
  harvests(where: HarvestWhereInput): [Harvest!]!

  """Get plaid link token for user"""
  linkToken(authConnectionId: String): String!
  log(logId: Int!): Log
  logs(orderBy: LogOrderByRelationAggregateInput, pagination: PaginationProps): [Log!]!
  logsCount: Int!

  """Lot current view"""
  lotCurrent(lotIds: [String!], lotValueType: LotValueType, minTotalPAndL: Float): [LotCurrent!]!

  """Get all lot uploads"""
  lotUploads(where: LotUploadWhereInput!): [LotUpload!]!
  lots(includeTaxAdvantaged: Boolean, where: LotWhereInput): [Lot!]!
  mergeError(id: String!): MergeError
  mergeErrors: [MergeError!]!
  newConnectPlaidInstitutionOptions: [PlaidInstitution!]!
  plaidAuthConnections: [AuthConnection!]!

  """Get a single Plaid institution (admin-only)"""
  plaidInstitution(institutionId: String!): PlaidInstitution

  """Get institution information from Plaid"""
  plaidInstitutionInfo(institutionId: String!): PlaidInstitutionInfo!

  """Get all Plaid institutions (admin-only)"""
  plaidInstitutions(skip: Int, take: Int, where: PlaidInstitutionWhereInput): [PlaidInstitution!]!

  """Get total count of Plaid institutions (admin-only)"""
  plaidInstitutionsCount(where: PlaidInstitutionWhereInput): Int!
  plaidMerge(plaidMergeId: String!): PlaidMerge
  plaidMerges(orderBy: PlaidMergeOrderByRelationAggregateInput): [PlaidMerge!]!

  """Get authenticated portfolio"""
  portfolioAuthed: Portfolio!
  portfolioConnect(id: String!): PortfolioConnect!
  portfolioConnections(where: PortfolioConnectWhereInput): [PortfolioConnect!]!

  """Get portfolio performance data broken down by accounts"""
  portfolioPerformanceByAccount(input: AccountPerformanceInput!): [AccountPerformanceDataPoint!]!

  """Get portfolio performance data broken down by positions"""
  portfolioPerformanceByPosition(input: PositionPerformanceInput!): [PositionPerformanceDataPoint!]!
  portfolioPositions: [Position!]!

  """Summary summary"""
  portfolioSummary: PortfolioSummary!

  """Get all portfolios for a user"""
  portfolios: [Portfolio!]!
  products(active: String): [StripeProduct!]!

  """Get accounts that need setup"""
  setupAccounts: [Account!]!
  stripeSession(stripeCustomerId: String!, stripePriceId: String!): StripeSession!

  """Find a connected transaction by id"""
  transaction(id: String!): Transaction!

  """Get transactions"""
  transactions(where: TransactionWhereInput): [Transaction!]!

  """Get current user"""
  userCurrent: User!

  """Get all users on a portfolio"""
  usersOnPortfolio: [User!]!
}

enum QueryMode {
  default
  insensitive
}

