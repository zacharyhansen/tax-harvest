"""
This model really should never be shown to the user - most api's have it but its
just a grouping of open lots. We track it as its needed for calculations derived from plaid 
but user facing tables etc. and harvest calc's should roll up lots 
"""
type Position {
  _count: PositionCount!
  account: Account!
  accountId: String!
  asset: Asset!
  assetSymbol: String!
  change: Decimal
  changePCT: Decimal
  commissionDay: Decimal
  commissionTotal: Decimal
  costPerShare: Decimal
  costTotal: Decimal
  createdAt: DateTime!
  dateAcquired: DateTime
  dateExpiration: DateTime

  """The unique id in the external system for the position"""
  externalId: String
  feesDay: Decimal
  feesOther: Decimal
  gainDay: Decimal
  gainTotal: Decimal
  gainTotalPCT: Decimal
  id: ID!
  lots: [Lot!]
  marketValue: Decimal
  portfolio: Portfolio!
  portfolioId: String!
  positionSnapshot: PositionSnapshot!
  positionSnapshotId: String!
  pricePaid: Decimal
  quantity: Decimal!
  quoteStatus: String
  type: String
  updatedAt: DateTime!
}

