  """should revert transactions be performed"""
  revert: Boolean!
  revertHarvestTransactionItem: HarvestTransactionItem
  revertHarvestTransactionItemId: String
  revertReplacementTransactionItem: HarvestTransactionItem
  revertReplacementTransactionItemId: String
  updatedAt: DateTime!
}

