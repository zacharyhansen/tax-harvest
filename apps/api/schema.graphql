type PolygonStockData {
  """The close price for the symbol in the given time period."""
  c: Float

  """The highest price for the symbol in the given time period."""
  h: Float

  """The lowest price for the symbol in the given time period."""
  l: Float

  """The number of transactions in the aggregate window."""
  n: Float

  """The open price for the symbol in the given time period."""
  o: Float

  """The Unix Msec timestamp for the start of the aggregate window."""
  t: Float

  """The trading volume of the symbol in the given time period."""
  v: Float

  """The volume weighted average price."""
  vw: Float
}

enum PorfolioConnectState {
  COMPLETED
  ERROR
  PENDING
}

type Portfolio {
  _count: PortfolioCount!
  accountRealizedPAndLHistory: [AccountRealizedPAndLHistory!]
  accounts: [Account!]
  assetMerge: [AssetMerge!]
  authConnections: [AuthConnection!]
  createdAt: DateTime!
  createdBy: User!
  createdById: String!
  endOfYearTaxOpportunityNotification: Boolean!
  files: [File!]

  """How often should we harvest for the portfolio"""
  harvestCycleWeeks: Int!

  """
  How much $ amount does a single share need to exceed to be a valid harvest share (i.e. shares with a p/l lower we shouldnt even care about)
  """
  harvestShareDollarThreshold: Decimal!

  """
  As we iterate through different tickets to build a harvest, how much $ should we target before moving to the next one
  """
  harvestTickerBucketDollarSizeLong: Decimal!

  """
  As we iterate through different tickets to build a harvest, how much $ should we target before moving to the next one
  """
  harvestTickerBucketDollarSizeShort: Decimal!

  """How much is a valid bucket (otherwise a ticker is considered 'slop')"""
  harvestTickerBucketLowerLimitLong: Decimal!

  """How much is a valid bucket (otherwise a ticker is considered 'slop')"""
  harvestTickerBucketLowerLimitShort: Decimal!
  harvestTransaction: [HarvestTransaction!]
  harvestTransactionItem: [HarvestTransactionItem!]
  harvests: [Harvest!]
  id: ID!
  log: [Log!]
  lotChange: [LotChange!]
  lotChangeList: [LotChangeList!]
  lotUpload: [LotUpload!]
  lotUploadFile: [LotUploadFile!]
  lots: [Lot!]
  mergeError: [MergeError!]

  """Minimum p and l for a lot to be considered harvestable"""
  minimumLotPAndL: Decimal!
  name: String!
  notification: [Notification!]
  notificationFrequency: HarvestNotificationFrequency!
  plaidMerge: [PlaidMerge!]
  porfolioConnect: [PortfolioConnect!]
  portfolioBalanceSnapshot: [PortfolioBalanceSnapshot!]
  positionSnapshot: [PositionSnapshot!]
  positions: [Position!]
  realizedPAndL: [RealizedPAndL!]
  transactionOnAssetMerge: [TransactionOnAssetMerge!]
  transactions: [Transaction!]
  updatedAt: DateTime!
  usersOnPortfolios: [UsersOnPortfolios!]
}

