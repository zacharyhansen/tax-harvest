"""
Represent the logical unit of a harvest transaction whose entry point is a sale of a security. It can possibly have a replacement buy and then a revert after the wash sale window for the sale / sale + buy
"""
type HarvestTransaction {
  """
  Is this transaction part of counter group of transactions for harvest (i.e. selling a gain to counter the loss that was selected)
  """
  counterTransaction: Boolean!
  createdAt: DateTime!
  harvest: Harvest!
  harvestId: String!
  harvestTransactionItem: HarvestTransactionItem!
  harvestTransactionItemId: String!
  id: ID!
  portfolio: Portfolio!
  portfolioId: String!
  replacementTransactionItem: HarvestTransactionItem
  replacementTransactionItemId: String

  """should revert transactions be performed"""
  revert: Boolean!
  revertHarvestTransactionItem: HarvestTransactionItem
  revertHarvestTransactionItemId: String
  revertReplacementTransactionItem: HarvestTransactionItem
  revertReplacementTransactionItemId: String
  updatedAt: DateTime!
}

