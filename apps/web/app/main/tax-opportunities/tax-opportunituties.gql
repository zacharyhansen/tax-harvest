fragment FiniteHarvestLotItem on LotCurrent {
  id
  accountId
  remainingQty
  acquiredDate
  price
  symbol
  lastPrice
  costBasis
  value
  gainTotal
  gainTotalPct
  dollarPerSharePnL
  taxGain
}

fragment MatchedLotOrderItem on HarvestLotOrder {
  accountId
  costBasis
  gainTotal
  id
  lotId
  pricePaid
  quantity
  taxGain
  assetSymbol
  dollarPerSharePnL
  valueTotal
  orderType
  acquiredDate
  lastPrice
}
fragment UnrealizedHarvestItem on UnrealizedHarvestMatchResult {
  sourceLot {
    id
    ...FiniteHarvestLotItem
  }
  matchedLotOrders {
    id
    ...MatchedLotOrderItem
  }
}

query FiniteHarvest {
  finiteHarvest {
    harvestType
    summary {
      realized {
        gainTotal
      }
      unrealized {
        gainTotal
        lossTotal
      }
    }
    lotsCurrent {
      id
      ...FiniteHarvestLotItem
    }
    unrealizedHarvestMatchResults {
      ...UnrealizedHarvestItem
    }
  }
}
