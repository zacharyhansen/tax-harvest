fragment FiniteHarvestLotItem on LotCurrent {
  id
  accountId
  remainingQty
  acquiredDate
  price
  symbol
  lastPrice
  costBasis
  value
  gainTotal
  gainTotalPct
  dollarPerSharePnL
  taxGain
}

query FiniteHarvest {
  finiteHarvest {
    summary {
      realized {
        gainTotal
      }
      unrealized {
        gainTotal
        lossTotal
      }
    }
    lotsCurrent {
      id
      ...FiniteHarvestLotItem
    }
    harvestType
  }
}
