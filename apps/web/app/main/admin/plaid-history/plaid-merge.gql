query PlaidMerges {
	plaidMerges {
		id
		createdAt
		updatedAt
		accountId
		account {
			id
			name
			institution
		}
		portfolioId
		assetMerge {
			id
			assetSymbol
			targetValue
			targetQuantity
		}
	}
}

query PlaidMerge($plaidMergeId: String!) {
	plaidMerge(plaidMergeId: $plaidMergeId) {
		id
		createdAt
		updatedAt
		accountId
		portfolioId
		resolveLotsInput
		account {
			id
			name
			institution
			type
		}
		portfolio {
			id
			name
		}
		assetMerge {
			id
			createdAt
			assetSymbol
			targetValue
			targetQuantity
			targetPositionSnapshot
			lotData
			resolvedLotChange
			realizedProfitAndLossShortTerm
			realizedProfitAndLossLongTerm
			error
			asset {
				symbol
				name
				lastPrice
			}
			mergeError {
				id
				type
				resolved
			}
			lotChangeList {
				id
				LotChange {
					id
					lotId
					aquiredDate
					quantityFinal
					quantityChange
					price
					assetSymbol
					shouldDelete
					operationType
					lot {
						id
						acquiredDate
						price
						remainingQty
					}
				}
			}
			usedLotChangeList {
				id
				LotChange {
					id
					lotId
					aquiredDate
					quantityFinal
					quantityChange
					price
					assetSymbol
					shouldDelete
					operationType
					lot {
						id
						acquiredDate
						price
						remainingQty
					}
				}
			}
			transactionOnAssetMerge {
				transaction {
					id
					externalId
					transactionDate
					type
					subtype
					assetSymbol
					quantity
					price
					amount
				}
			}
		}
	}
}
