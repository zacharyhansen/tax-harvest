fragment Log on Log {
  id
  createdAt
  description
  responseStatus
  source
  type
}

query Logs($pagination: PaginationProps) {
  logs(pagination: $pagination) {
    id
    ...Log
  }
  logsCount
}

fragment LogDetails on Log {
  id
  createdAt
  description
  responseStatus
  source
  type
  data
}

query Log($logId: Int!) {
  log(logId: $logId) {
    id
    ...LogDetails
  }
}
