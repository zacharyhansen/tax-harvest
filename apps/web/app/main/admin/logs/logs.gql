fragment Log on Log {
	id
	createdAt
	description
	responseStatus
	source
	type
	mergeError {
		id
		assetSymbol
		type
		resolved
	}
}

query Logs($pagination: PaginationProps) {
	logs(pagination: $pagination) {
		id
		...Log
	}
	logsCount
}

fragment LogDetails on Log {
	id
	createdAt
	description
	responseStatus
	source
	type
	data
	mergeError {
		id
		assetSymbol
		type
		resolved
		targetValue
		targetQuantity
	}
}

query Log($logId: Int!) {
	log(logId: $logId) {
		id
		...LogDetails
	}
}
