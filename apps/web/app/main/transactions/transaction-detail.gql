query TransactionDetail($transactionId: String!) {
	transaction(id: $transactionId) {
		id
		quantity
		type
		description
		assetSymbol
		settlementDate
		securityType
		displaySymbol
		amount
		externalId
		fee
		memo
		price
		subtype
		transactionDate
		merged
		createdAt
		updatedAt
		paymentCurrency
		settlementCurrency
		postDate
		detailsURI
		account {
			id
			name
			institution
			type
			authConnection {
				id
				source
			}
		}
		asset {
			symbol
			name
			assetType {
				code
				description
			}
		}
		portfolio {
			id
			name
		}
		transactionOnAssetMerge {
			assetMerge {
				id
				assetSymbol
				targetValue
				targetQuantity
				error
				createdAt
				updatedAt
				lotData
				mergeError {
					id
					type
					resolved
				}
				transactionOnAssetMerge {
					transaction {
						id
						type
						assetSymbol
						quantity
						price
						amount
						fee
						transactionDate
						description
					}
				}
				lotChangeList {
					id
					appliedToAccount
					AccountRealizedPAndLHistory {
						id
						value
						profitAndLossType
					}
					LotChange {
						id
						assetSymbol
						aquiredDate
						operationType
						price
						quantityChange
						quantityFinal
						realizedProfitAndLossShortTerm
						realizedProfitAndLossLongTerm
						lot {
							id
							assetSymbol
							remainingQty
							acquiredDate
							price
						}
					}
				}
			}
		}
		accountRealizedPAndLHistory {
			id
			value
			profitAndLossType
			createdAt
			realizedPAndL {
				id
				shortTermCapitalGain
				longTermCapitalGain
				unrealizedLoss
				unrealizedProfit
			}
		}
	}
}
