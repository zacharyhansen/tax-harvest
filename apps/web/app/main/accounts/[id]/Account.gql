fragment AccountItem on Account {
  id
  name
  type
  portfolioId
  provider
  externalId
  key
  description
  institution
  mode
  status
  optionLevel
  cashForOpenOrders
  balanceMoneyMarket
  cashAvailableForInvestment
  accountValueTotal
  marketValueTotal
  cashNet
  cashBalance
  balanceAccount
  createdAt
  updatedAt
  createdBy {
    id
    ...UserItem
  }
  _realizedProfitAndLoss {
    id
    longTerm
    shortTerm
    dividend
    year
    deferredLoss
  }
}

query Account($id: String!) {
  account(id: $id) {
    id
    ...AccountItem
  }
}

mutation UpdateAccount(
  $accountUpdateInput: AccountUpdateInput!
  $accountWhereUniqueInput: AccountWhereUniqueInput!
) {
  updateAccount(
    accountUpdateInput: $accountUpdateInput
    accountWhereUniqueInput: $accountWhereUniqueInput
  ) {
    id
    name
    portfolioId
    description
  }
}

mutation UpdateAccountRealizedPAndL(
  $id: String!
  $input: RealizedPAndLUpdateInput!
) {
  updateRealizedPAndL(id: $id, input: $input) {
    id
    shortTerm
    longTerm
    deferredLoss
    dividend
  }
}
