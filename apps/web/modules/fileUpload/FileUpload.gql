query SignedUrlsForUpload($files: [GCPUploadFile!]!) {
	generateSignedUrlsForUpload(files: $files) {
		uploadUrls
	}
}

query SignedUrlsForDownload($gcpFileNames: [String!]!) {
	genrerateSignedUrlsForDownload(gcpFileNames: $gcpFileNames) {
		downloadUrls
	}
}

fragment FileItem on File {
	id
	accountId
	displayName
	gcpFilename
	type
}

mutation InitLotUpload($input: FileCreateManyInput!) {
	initLotUpload(input: $input) {
		...LotUploadItem
	}
}

mutation InitAccountFileUpload(
	$fileData: [InitFileUploadPayload!]!
	$accountData: InitAccountFileUploadPayload
	$accountId: String
) {
	initAccountFileUpload(
		fileData: $fileData
		accountData: $accountData
		accountId: $accountId
	) {
		accountId
		files {
			...FileItem
		}
	}
}
