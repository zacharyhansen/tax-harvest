name: Release Notification

on:
  pull_request:
    types: [closed]
    branches: [trunk]

permissions:
  contents: read

jobs:
  send-slack-notification:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'update-version-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version
        id: extract_version
        run: |
          # Extract version from branch name (update-version-X.Y.Z)
          REF="${{ github.event.pull_request.head.ref }}"
          VERSION=${REF#update-version-}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get Release Notes
        id: release_notes
        run: |
          RELEASE_NOTES=$(curl -s \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ steps.extract_version.outputs.version }}" | \
            jq -r '.body // "No release notes available"')
          # Escape newlines and quotes for JSON
          RELEASE_NOTES=$(echo "$RELEASE_NOTES" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          echo "notes=$RELEASE_NOTES" >> $GITHUB_OUTPUT

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Version ${{ steps.extract_version.outputs.version }} has been released!",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Version ${{ steps.extract_version.outputs.version }} Released",
                    "emoji": true
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Pull Request: <${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "Release notes: <https://github.com/${{ github.repository }}/releases/tag/v${{ steps.extract_version.outputs.version }}|View on GitHub>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "Deployment Status: <https://argocd-dev.taxharvest.ai/applications/argocd/development-taxharvester?view=tree&resource=|View on ArgoCD>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release Notes:*\n${{ steps.release_notes.outputs.notes }}"
                  }
                }
              ]
            }
