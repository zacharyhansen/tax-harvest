# .github/workflows/build-and-release.yml
name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: Version increment type (major/minor/patch)
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      deployment_env:
        description: Deployment environment (development/staging/production)
        required: true
        type: choice
        options:
          - development
          - production
        default: development
      manual_version:
        description: Manual version override (leave empty for automatic)
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write

env:
  PROJECT_ID: harvester-ai-428202
  AR_REPO_LOCATION: us-central1
  AR_URL_PREFIX: us-central1-docker.pkg.dev/harvester-ai-428202/harvester
  SERVICE_ACCOUNT: githubactions@harvester-ai-428202.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: projects/415549375710/locations/global/workloadIdentityPools/harvester-pool/providers/github-actions-provider

jobs:
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate New Version
        id: version
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"
          echo "previous_tag=$latest_tag" >> $GITHUB_OUTPUT

          if [[ -n "${{ inputs.manual_version }}" ]]; then
            new_version="${{ inputs.manual_version }}"
            echo "Using manual version: $new_version"
          else
            version=$(echo $latest_tag | sed 's/v//')
            IFS='.' read -ra version_parts <<< "$version"

            case "${{ inputs.version_type }}" in
              major)
                version_parts[0]=$((version_parts[0]+1))
                version_parts[1]=0
                version_parts[2]=0
                ;;
              minor)
                version_parts[1]=$((version_parts[1]+1))
                version_parts[2]=0
                ;;
              patch)
                version_parts[2]=$((version_parts[2]+1))
                ;;
            esac

            new_version="${version_parts[0]}.${version_parts[1]}.${version_parts[2]}"
          fi

          echo "new_version=$new_version" >> $GITHUB_OUTPUT

  build-web:
    name: Build and Push Web Image
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with Google Cloud and Docker
        uses: ./.github/actions/auth

      - name: Build and Push Web Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.AR_URL_PREFIX }}-web/harvester-web:v${{ needs.version.outputs.new_version }}
            ${{ env.AR_URL_PREFIX }}-web/harvester-web:latest
          cache-from: type=registry,ref=${{ env.AR_URL_PREFIX }}-web/harvester-web:latest
          cache-to: type=inline

  build-api:
    name: Build and Push API Image
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with Google Cloud and Docker
        uses: ./.github/actions/auth

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.AR_URL_PREFIX }}-api/harvester-api:v${{ needs.version.outputs.new_version }}
            ${{ env.AR_URL_PREFIX }}-api/harvester-api:latest
          cache-from: type=registry,ref=${{ env.AR_URL_PREFIX }}-api/harvester-api:latest
          cache-to: type=inline
          args: |
            DEPLOYMENT_ENV=${{ inputs.deployment_env }} # development, production

  # - name: Build and Push Studio Image
  #   uses: docker/build-push-action@v5
  #   with:
  #     context: .
  #     file: Dockerfile.prisma.microservice
  #     push: true
  #     build-args: |
  #       PROJECT=harvester-api
  #     tags: |
  #       ${{ env.AR_URL_PREFIX }}-api/harvester-studio:v${{ needs.version.outputs.new_version }}
  #       ${{ env.AR_URL_PREFIX }}-api/harvester-studio:latest
  #     cache-from: type=registry,ref=user/app:latest
  #     cache-to: type=inline

  create-tag:
    name: Tag and Release
    needs: [version, build-web, build-api]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Setup Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and Push Tag
        run: |
          VERSION=${{ needs.version.outputs.new_version }}
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: Create Release Branch
        run: |
          # Create a new branch based on the latest commit (or a specific commit if necessary)
          git checkout -b release-v${{ needs.version.outputs.new_version }}
          git push origin release-v${{ needs.version.outputs.new_version }}

      - name: Update Image Tags in Helm Values
        run: |
          # Update the values.yaml file with new version tags
          yq eval '.api.image.tag = "v${{ needs.version.outputs.new_version }}" |
                   .web.image.tag = "v${{ needs.version.outputs.new_version }}"' -i helm/values.yaml

          # Commit and push changes to the release branch
          git add helm/values.yaml
          git commit -m "chore(automated): update image tags to v${{ needs.version.outputs.new_version }}"
          git push origin release-v${{ needs.version.outputs.new_version }}

      - name: Generate Detailed Changelog
        id: changelog
        run: |
          PREVIOUS_TAG="${{ needs.version.outputs.previous_tag }}"
          NEW_VERSION="${{ needs.version.outputs.new_version }}"

          echo "## What's Changed in v$NEW_VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Get all commits since previous tag
          ALL_COMMITS=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"%h %s" --reverse)

          # Generate different sections based on conventional commits
          echo "### 🚀 Features" >> CHANGELOG.md
          echo "$ALL_COMMITS" | grep -i " feat[(:] \|^feat[(:] " | sed 's/\([a-f0-9]\{7,\}\) \(.*\)/\* \2 (\1)/' >> CHANGELOG.md || echo "* No new features" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "### 🐛 Bug Fixes" >> CHANGELOG.md
          echo "$ALL_COMMITS" | grep -i " fix[(:] \|^fix[(:] " | sed 's/\([a-f0-9]\{7,\}\) \(.*\)/\* \2 (\1)/' >> CHANGELOG.md || echo "* No bug fixes" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "### 🧪 Tests and CI" >> CHANGELOG.md
          echo "$ALL_COMMITS" | grep -i " test[(:] \|^test[(:] \| ci[(:] \|^ci[(:] " | sed 's/\([a-f0-9]\{7,\}\) \(.*\)/\* \2 (\1)/' >> CHANGELOG.md || echo "* No test/CI changes" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "### 📚 Documentation" >> CHANGELOG.md
          echo "$ALL_COMMITS" | grep -i " docs[(:] \|^docs[(:] " | sed 's/\([a-f0-9]\{7,\}\) \(.*\)/\* \2 (\1)/' >> CHANGELOG.md || echo "* No documentation changes" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "### 🧹 Chores and Refactoring" >> CHANGELOG.md
          echo "$ALL_COMMITS" | grep -i " chore[(:] \|^chore[(:] \| refactor[(:] \|^refactor[(:] " | sed 's/\([a-f0-9]\{7,\}\) \(.*\)/\* \2 (\1)/' >> CHANGELOG.md || echo "* No chores or refactoring" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Filter out already categorized commits
          CATEGORIZED=$(echo "$ALL_COMMITS" | grep -i " feat[(:] \|^feat[(:] \| fix[(:] \|^fix[(:] \| test[(:] \|^test[(:] \| ci[(:] \|^ci[(:] \| docs[(:] \|^docs[(:] \| chore[(:] \|^chore[(:] \| refactor[(:] \|^refactor[(:] ")

          echo "### 📦 Other Changes" >> CHANGELOG.md
          if [ -n "$CATEGORIZED" ]; then
            comm -23 <(echo "$ALL_COMMITS" | sort) <(echo "$CATEGORIZED" | sort) | sed 's/\([a-f0-9]\{7,\}\) \(.*\)/\* \2 (\1)/' >> CHANGELOG.md || echo "* No other changes" >> CHANGELOG.md
          else
            echo "$ALL_COMMITS" | sed 's/\([a-f0-9]\{7,\}\) \(.*\)/\* \2 (\1)/' >> CHANGELOG.md || echo "* No other changes" >> CHANGELOG.md
          fi

          # Save the changelog to outputs
          CHANGELOG_CONTENT=$(cat CHANGELOG.md)
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: Release v${{ needs.version.outputs.new_version }}
          body: |
            ${{ env.CHANGELOG }}

            ## Docker Images
            ```
            ${{ env.AR_URL_PREFIX }}-api/harvester-api:v${{ needs.version.outputs.new_version }}
            ${{ env.AR_URL_PREFIX }}-web/harvester-web:v${{ needs.version.outputs.new_version }}
            ${{ env.AR_URL_PREFIX }}-api/harvester-studio:v${{ needs.version.outputs.new_version }}
            ```

            ## Automated Release
            This release was automatically generated by the CI/CD pipeline.
          draft: false
          prerelease: false
          generate_release_notes: true
