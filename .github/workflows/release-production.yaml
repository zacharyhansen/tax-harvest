name: Release to Production

on:
  workflow_dispatch:
    inputs:
      api_version:
        description: API version to deploy (e.g., v3.2.0). Leave empty to use current dev version.
        required: false
        type: string
      web_version:
        description: Web version to deploy (e.g., v3.2.0). Leave empty to use current dev version.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-production-values:
    name: Update Production Helm Values
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Determine Versions
        id: versions
        run: |
          # If no versions provided, extract from dev values.yaml
          if [[ -z "${{ inputs.api_version }}" ]]; then
            API_VERSION=$(yq eval '.api.image.tag' helm/values.yaml)
            echo "Using API version from dev: $API_VERSION"
          else
            API_VERSION="${{ inputs.api_version }}"
            # Add 'v' prefix if not present
            if [[ ! "$API_VERSION" =~ ^v ]]; then
              API_VERSION="v$API_VERSION"
            fi
            echo "Using provided API version: $API_VERSION"
          fi

          if [[ -z "${{ inputs.web_version }}" ]]; then
            WEB_VERSION=$(yq eval '.web.image.tag' helm/values.yaml)
            echo "Using Web version from dev: $WEB_VERSION"
          else
            WEB_VERSION="${{ inputs.web_version }}"
            # Add 'v' prefix if not present
            if [[ ! "$WEB_VERSION" =~ ^v ]]; then
              WEB_VERSION="v$WEB_VERSION"
            fi
            echo "Using provided Web version: $WEB_VERSION"
          fi

          echo "api_version=$API_VERSION" >> $GITHUB_OUTPUT
          echo "web_version=$WEB_VERSION" >> $GITHUB_OUTPUT

      - name: Update Production Values
        run: |
          # Update the values-prod.yaml file with new version tags
          yq eval '.api.image.tag = "${{ steps.versions.outputs.api_version }}" |
                   .web.image.tag = "${{ steps.versions.outputs.web_version }}"' -i helm/values-prod.yaml

          # Verify the file was updated
          echo "Updated versions in values-prod.yaml:"
          echo "API: $(yq eval '.api.image.tag' helm/values-prod.yaml)"
          echo "Web: $(yq eval '.web.image.tag' helm/values-prod.yaml)"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "release: deploy to production - API ${{ steps.versions.outputs.api_version }}, Web ${{ steps.versions.outputs.web_version }}"
          title: "🚀 Release to Production - API ${{ steps.versions.outputs.api_version }}, Web ${{ steps.versions.outputs.web_version }}"
          body: |
            ## Production Release

            This PR updates the production Helm values with the following versions:
            
            ### 📦 Image Versions
            - **API**: `${{ steps.versions.outputs.api_version }}`
            - **Web**: `${{ steps.versions.outputs.web_version }}`

            ### 📋 Checklist
            - [ ] Verify all tests pass in development environment
            - [ ] Review changes in the development environment
            - [ ] Confirm database migrations (if any) are production-ready
            - [ ] Check for any breaking changes
            - [ ] Verify monitoring and alerting are configured

            ### 🔄 Rollback Plan
            If issues arise after deployment, revert this PR or create a new release with the previous stable versions.

            ---
            This update was automatically generated by the production release workflow.
          branch: release-prod-${{ steps.versions.outputs.api_version }}-${{ steps.versions.outputs.web_version }}
          base: trunk
          delete-branch: true
          labels: |
            production
            release
            automated-pr