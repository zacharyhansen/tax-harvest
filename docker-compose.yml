version: "3.8"

services:
  postgres:
    image: ankane/pgvector
    restart: always
    environment:
      - POSTGRES_DB=taxharvest
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgodigos_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
  swagger:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      API_URL: http://localhost:3003/

volumes:
  pgodigos_data:
